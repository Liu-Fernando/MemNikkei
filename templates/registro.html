<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/components/header.js" type="text/javascript"></script>
    <title>Cadastro — Memórias Nikkei</title>
</head>
<body>
    <header-component></header-component>
    {% include 'botao_voltar.html' %}

    <section class="conteudo">

        <p class="textoPaginaInicial auth-titulo">Criar sua conta</p>

        {% if erro %}
        <p class="auth-erro">{{ erro }}</p>
        {% endif %}

        {% if msg %}
        <p class="auth-sucesso">{{ msg }}</p>
        {% endif %}

        <form method="POST" action="/registro">

            <p class="auth-label">Email</p>
            <input type="email" name="email" placeholder="seuemail@exemplo.com" required>

            <p class="auth-label">Confirmar email</p>
            <input type="email" name="email_confirmar" placeholder="Digite o email novamente" required>

            <p class="auth-label">Senha</p>
            <input type="password" name="senha" placeholder="Crie uma senha" required>

            <br><br>
            <div class="auth-submit-container">
                <input type="submit" value="Cadastrar">
            </div>

        </form>

        <br>
        <p class="auth-link-container">
            Já tem conta? <br>
            <a href="/login">Entre aqui</a>
        </p>

    </section>
</body>
</html>
