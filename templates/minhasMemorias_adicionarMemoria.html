<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/components/header.js" type="text/javascript"></script>
    <title>Adicionar Memoria</title>
</head>
<body>
    <header-component></header-component>
    {% include 'botao_voltar.html' %}
    <section class="conteudo">
        <h2 id="titulinho">Guarde suas Memórias aqui! <br> Você pode inserir uma foto de cada vez.</h2>

        {% if erro %}
            <p class="erroMensagem">{{ erro }}</p>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" action="{{ url_for('minhasMemorias_adicionarMemoria') }}">

            <label class="BotaoAzulClaro" id="uploadArquivos" for="selecionarArquivos">
                Selecionar arquivo
                <input
                    type="file"
                    id="selecionarArquivos"
                    name="selecionarArquivos"
                    accept="image/*"
                >
            </label>

            <div class="textBox">

                <label for="dataMemoria">Data da memória: <span class="campoObrigatorio">*Obrigatório</span></label>
                <input
                    type="date"
                    id="dataMemoria"
                    name="dataMemoria"
                    placeholder="dd/mm/aaaa"
                    value="{{ form.dataMemoria if form else '' }}"
                    required
                ><br><br>

                <script>
                    document.getElementById('dataMemoria').max = new Date().toISOString().split('T')[0];
                </script>

                <label for="tituloMemoria">Título da memória: <span class="campoOpcional">Opcional</span></label>
                <input
                    type="text"
                    id="tituloMemoria"
                    name="tituloMemoria"
                    maxlength="100"
                    placeholder="Digite o título da memória"
                    value="{{ form.tituloMemoria if form else '' }}"
                ><br><br>

                <label for="localMemoria">Local da memória: <span class="campoOpcional">Opcional</span></label>
                <input
                    type="text"
                    id="localMemoria"
                    name="localMemoria"
                    maxlength="60"
                    placeholder="Digite o local da memória"
                    value="{{ form.localMemoria if form else '' }}"
                ><br><br>

                <label for="descricao">Descrição da memória: <span class="campoOpcional">Opcional</span></label>
                <textarea
                    id="descricao"
                    name="descricao"
                    maxlength="400"
                    placeholder="Descreva esta memória"
                >{{ form.descricao if form else '' }}</textarea><br><br>

                <input type="submit" value="Salvar memória">
            </div>
        </form>
    </section>
</body>
</html>
