<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/components/header.js" type="text/javascript"></script>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='MemLogo.png') }}">
    <title>Entrar — Memórias Nikkei</title>
</head>
<body>
    <header-component></header-component>
    {% include 'botao_voltar.html' %}

    <section class="conteudo">

        <p class="textoPaginaInicial auth-titulo">Entrar na sua conta</p>

        {% if erro %}
        <p class="auth-erro">{{ erro }}</p>
        {% endif %}

        <form method="POST" action="/login">

            <p class="auth-label">Email</p>
            <input type="email" name="email" placeholder="seuemail@exemplo.com" required>

            <p class="auth-label">Senha</p>
            <input type="password" name="senha" placeholder="Sua senha" required>

            <br><br>
            <div class="auth-submit-container">
                <input type="submit" value="Entrar">
            </div>

        </form>

        <br>
        <p class="auth-link-container">
            <a href="/esqueci-senha">Esqueci minha senha</a>
        </p>

        <br>
        <p class="auth-link-container">
            Não tem conta ainda? <br>
            <a href="/registro">Cadastre-se aqui</a>
        </p>

        {% if not is_guest %}
        <br>
        <p class="auth-link-container">
            Ou <a href="/guest">entre como visitante</a>
        </p>
        {% else %}
        <br>
        <p class="auth-link-container">
            Para acessar essa página, faça login ou cadastre-se.
        </p>
        {% endif %}

    </section>
</body>
</html>
