<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='MemLogo.png') }}">
    <title>Minhas análises Ikigai</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/questionario.css">
    <script src="/static/components/header.js" type="text/javascript"></script>
</head>

<body>
    <header-component></header-component>
    {% include 'botao_voltar.html' %}
    <section class="conteudo">

        <div id="container">
            <p class="tema">MINHAS ANÁLISES</p>

            {% if analises %}
                {% for a in analises %}
                    <div class="cardAnaliseIkigai">
                        <p class="dataAnaliseIkigai">{{ a.data_formatada }}</p>
                        <div class="analiseIkigai" data-texto="{{ a.analise }}"></div>
                        <form method="POST" action="{{ url_for('ikigai_deletar_analise', id=a.id) }}"
                              onsubmit="return confirm('Apagar esta análise?');">
                            <button type="submit" class="botaoVoltar">Apagar</button>
                        </form>
                    </div>
                {% endfor %}
            {% else %}
                <p class="textoItalico" style="margin-top: 8vw;">
                    Você ainda não tem análises salvas.
                </p>
                <a class="BotaoAzulClaro" href="{{ url_for('minhaJornadaIkigai') }}">Fazer questionário Ikigai</a>
            {% endif %}
        </div>

    </section>

    <script>
        function escapeHtml(s) {
            return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }
        function formatarAnalise(texto) {
            const blocos = texto.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
            return blocos.map(bloco => {
                const tituloSecao = bloco.match(/^\d+\.\s*\*\*(.+?)\*\*\s*:?\s*([\s\S]*)$/);
                if (tituloSecao) {
                    const titulo = escapeHtml(tituloSecao[1].trim());
                    const resto = tituloSecao[2].trim();
                    let html = `<h3 class="secaoIkigai">${titulo}</h3>`;
                    if (resto) {
                        const seguro = escapeHtml(resto).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                        html += `<p>${seguro.replace(/\n/g, "<br>")}</p>`;
                    }
                    return html;
                }
                const seguro = escapeHtml(bloco).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
                return `<p>${seguro.replace(/\n/g, "<br>")}</p>`;
            }).join("");
        }
        document.querySelectorAll('.analiseIkigai[data-texto]').forEach(el => {
            el.innerHTML = formatarAnalise(el.dataset.texto);
        });
    </script>
</body>
</html>
