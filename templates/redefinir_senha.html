<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <script src="../static/components/header.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='MemLogo.png') }}">
    <title>Redefinir senha — Memórias Nikkei</title>
</head>
<body>
    <header-component></header-component>
    {% include 'botao_voltar.html' %}

    <section class="conteudo">

        <p class="textoPaginaInicial auth-titulo">Criar nova senha</p>

        <p id="mensagem-erro" class="auth-erro" style="display:none;"></p>
        <p id="mensagem-sucesso" class="auth-link-container" style="display:none;">
            Senha alterada com sucesso! <br>
            <a href="/login">Clique aqui para entrar</a>
        </p>

        <form id="form-nova-senha">
            <p class="auth-label">Nova senha</p>
            <input type="password" id="nova-senha" placeholder="Digite a nova senha" required>

            <p class="auth-label">Confirmar nova senha</p>
            <input type="password" id="nova-senha-confirmar" placeholder="Digite novamente" required>

            <br><br>
            <div class="auth-submit-container">
                <input type="submit" value="Salvar nova senha">
            </div>
        </form>

    </section>

    <script>
        const supabaseClient = supabase.createClient(
            "{{ supabase_url }}",
            "{{ supabase_key }}"
        );

        // O token do Supabase chega na URL depois do "#"
        // Ex: /redefinir-senha#access_token=xxx&refresh_token=yyy&type=recovery
        const hash = window.location.hash.substring(1);
        const params = new URLSearchParams(hash);
        const accessToken = params.get("access_token");
        const refreshToken = params.get("refresh_token");

        if (accessToken && refreshToken) {
            supabaseClient.auth.setSession({
                access_token: accessToken,
                refresh_token: refreshToken
            });
        } else {
            document.getElementById("mensagem-erro").textContent =
                "Link inválido ou expirado. Solicite um novo email de recuperação.";
            document.getElementById("mensagem-erro").style.display = "block";
            document.getElementById("form-nova-senha").style.display = "none";
        }

        document.getElementById("form-nova-senha").addEventListener("submit", async (e) => {
            e.preventDefault();
            const senha = document.getElementById("nova-senha").value;
            const confirmar = document.getElementById("nova-senha-confirmar").value;
            const erroEl = document.getElementById("mensagem-erro");
            const sucessoEl = document.getElementById("mensagem-sucesso");

            erroEl.style.display = "none";

            if (senha !== confirmar) {
                erroEl.textContent = "As senhas não coincidem.";
                erroEl.style.display = "block";
                return;
            }

            const { error } = await supabaseClient.auth.updateUser({ password: senha });

            if (error) {
                erroEl.textContent = "Erro ao atualizar a senha. Tente novamente.";
                erroEl.style.display = "block";
            } else {
                document.getElementById("form-nova-senha").style.display = "none";
                sucessoEl.style.display = "block";
            }
        });
    </script>
</body>
</html>
